<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LockTalk</title>

<style>
body{
    margin:0;
    font-family:-apple-system;
    background:#0b0f1a;
    color:white;
}

/* HEADER */
.header{
    display:flex;
    align-items:center;
    gap:10px;
    padding:15px;
    background:#111827;
    border-bottom:1px solid #222;
}

.logo{
    height:40px;
}

.chat{
    height:75vh;
    overflow:auto;
    padding:15px;
}

/* MENSAGENS */
.msg{
    max-width:70%;
    padding:10px 15px;
    margin:8px 0;
    border-radius:20px;
    cursor:pointer;
}

.me{
    background:#22c55e;
    margin-left:auto;
}

.other{
    background:#1f2937;
}

/* INPUT */
.input-area{
    display:flex;
    gap:10px;
    padding:10px;
    background:#111827;
}

input{
    flex:1;
    padding:12px;
    border-radius:20px;
    border:none;
}

button{
    background:#22c55e;
    border:none;
    padding:10px 15px;
    border-radius:20px;
    color:white;
    cursor:pointer;
}

/* MENU + */
.menu{
    position:fixed;
    bottom:80px;
    left:20px;
    background:#1f2937;
    padding:10px;
    border-radius:15px;
    display:none;
    flex-direction:column;
    gap:10px;
}

.menu button{
    background:#374151;
}

/* MODAL IMAGEM */
.modal{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:black;
    display:none;
    align-items:center;
    justify-content:center;
}

.modal img{
    max-width:90%;
    max-height:90%;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <img src="logo.png" class="logo">
    <h2>LockTalk</h2>
</div>

<!-- CHAT -->
<div class="chat" id="chat"></div>

<!-- INPUT -->
<div class="input-area">
    <button onclick="toggleMenu()">＋</button>
    <input id="msg" placeholder="Mensagem...">
    <button onclick="send()">Enviar</button>
</div>

<!-- MENU + -->
<div class="menu" id="menu">
    <button onclick="addEmoji('😀')">😀 Emoji</button>
    <button onclick="addEmoji('🔥')">🔥 Emoji</button>
    <button onclick="addEmoji('❤️')">❤️ Emoji</button>
    <button onclick="addImage()">📷 Foto</button>
</div>

<!-- MODAL -->
<div class="modal" id="modal" onclick="closeImage()">
    <img id="modalImg">
</div>

<script>

/* ENVIAR MENSAGEM */
function send(){
    let text=document.getElementById("msg").value;
    if(!text)return;

    createMsg(text,"me");
    document.getElementById("msg").value="";
}

/* CRIAR MENSAGEM */
function createMsg(text,type){
    let div=document.createElement("div");
    div.className="msg "+type;
    div.innerText=text;

    div.onclick=()=>alert("Opções futuras 👀");

    document.getElementById("chat").appendChild(div);
}

/* MENU */
function toggleMenu(){
    let m=document.getElementById("menu");
    m.style.display=m.style.display==="flex"?"none":"flex";
}

/* EMOJI */
function addEmoji(e){
    document.getElementById("msg").value+=e;
}

/* IMAGEM */
function addImage(){
    let input=document.createElement("input");
    input.type="file";
    input.accept="image/*";

    input.onchange=(e)=>{
        let file=e.target.files[0];
        let url=URL.createObjectURL(file);

        let img=document.createElement("img");
        img.src=url;
        img.style.maxWidth="150px";
        img.style.borderRadius="10px";
        img.className="msg me";

        img.onclick=()=>openImage(url);

        document.getElementById("chat").appendChild(img);
    };

    input.click();
}

/* ABRIR IMAGEM */
function openImage(src){
    document.getElementById("modal").style.display="flex";
    document.getElementById("modalImg").src=src;
}

/* FECHAR */
function closeImage(){
    document.getElementById("modal").style.display="none";
}

</script>

</body>
</html>
